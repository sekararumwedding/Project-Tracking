<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Logistics Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f1f3d 100%);
            min-height: 100vh;
            color: white;
        }
        .navbar {
            background: rgba(15, 31, 61, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-name {
            color: #cbd5e1;
        }
        .logout-btn {
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 1);
            transform: translateY(-2px);
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .welcome-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }
        .welcome-card h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .welcome-card p {
            color: #94a3b8;
            font-size: 16px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 14px;
        }
        .admin-badge {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">CS Logistics</div>
    <div class="user-info">
        <span class="user-name" id="userName">Loading...</span>
        <span id="adminBadge" class="admin-badge" style="display: none;">ADMIN</span>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
</div>

<!-- Main Content -->
<div class="container">
    <div class="welcome-card">
        <h1>Selamat Datang! 👋</h1>
        <p>Anda berhasil login ke Logistics Tracker</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Total Tender</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Dalam Proses</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Selesai</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Lunas</div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================
// ⚠️ GANTI DENGAN DATA SUPABASE ANDA ⚠️
// ============================================
var SUPABASE_URL = 'https://ixgwxbehsmgmczzfvjse.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Z3d4YmVoc21nbWN6emZ2anNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3OTksImV4cCI6MjA5MjU0NTc5OX0.rnZYdHiqLzRz5xAb9DR3YmeWY91LsfJJYYoeWa7s7WA';

// Initialize Supabase
var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Check authentication
window.addEventListener('load', function() {
    supabaseClient.auth.getSession().then(function(sessionData) {
        if (!sessionData.data || !sessionData.data.session) {
            // Not logged in, redirect to login
            window.location.href = 'index.html';
            return;
        }

        // Get user data
        var user = sessionData.data.session.user;
        var email = user.email;

        // Get profile data
        supabaseClient
            .from('profiles')
            .select('name, role')
            .eq('id', user.id)
            .single()
            .then(function(profileData) {
                if (profileData.data) {
                    document.getElementById('userName').textContent = profileData.data.name || email;
                    
                    // Show admin badge if admin
                    if (profileData.data.role === 'admin') {
                        document.getElementById('adminBadge').style.display = 'inline-block';
                    }
                } else {
                    document.getElementById('userName').textContent = email;
                }
            });
    });
});

// Logout function
function handleLogout() {
    if (confirm('Yakin ingin logout?')) {
        supabaseClient.auth.signOut().then(function() {
            window.location.href = 'index.html';
        });
    }
}
</script>

</body>
</html>
