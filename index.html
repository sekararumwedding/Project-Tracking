<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .hidden { display: none !important; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; max-width: 400px; margin: 50px auto; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; color: white; }
        .btn-masuk { background: #3b82f6; }
        .btn-masuk:hover { background: #2563eb; }
        .btn-daftar { background: #10b981; }
        .btn-daftar:hover { background: #059669; }
        .btn-logout { background: #ef4444; width: auto; padding: 5px 15px; }
        .alert { padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 14px; }
        .alert-error { background: #7f1d1d; color: #fca5a5; }
        .alert-success { background: #14532d; color: #86efac; }
        .text-center { text-align: center; }
        .text-sm { font-size: 14px; }
        .text-slate-400 { color: #94a3b8; }
        .text-blue-400 { color: #60a5fa; cursor: pointer; text-decoration: underline; }
        .mb-2 { margin-bottom: 8px; }
        .mb-4 { margin-bottom: 16px; }
        .mt-4 { margin-top: 16px; }
        
        /* Dashboard Styles */
        .dashboard-container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .nav { background: #1e293b; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge-admin { background: #fbbf24; color: black; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-left: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: bold; color: #3b82f6; }
    </style>
</head>
<body>

    <!-- HALAMAN LOGIN & REGISTER -->
    <div id="halaman-login" class="card">
        <div class="text-center mb-4">
            <div style="width: 50px; height: 50px; background: #3b82f6; border-radius: 10px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px;">CS</div>
            <h2>Logistics Tracker</h2>
            <p class="text-sm text-slate-400">PT. Cahaya Sejati Teknologi</p>
        </div>

        <div id="pesan-error" class="alert hidden"></div>

        <!-- Form Login -->
        <div id="form-login">
            <label class="text-sm text-slate-400">Email</label>
            <input type="email" id="email-login" placeholder="email@contoh.com">
            
            <label class="text-sm text-slate-400">Password</label>
            <input type="password" id="pass-login" placeholder="******">
            
            <button onclick="aksiLogin()" class="btn-masuk">Masuk</button>
            
            <p class="text-center text-sm text-slate-400 mt-4">
                Belum punya akun? <span onclick="tampilDaftar()" class="text-blue-400">Daftar</span>
            </p>
        </div>

        <!-- Form Register -->
        <div id="form-daftar" class="hidden">
            <label class="text-sm text-slate-400">Nama Lengkap</label>
            <input type="text" id="nama-daftar" placeholder="Nama Anda">
            
            <label class="text-sm text-slate-400">Email</label>
            <input type="email" id="email-daftar" placeholder="email@contoh.com">
            
            <label class="text-sm text-slate-400">Password</label>
            <input type="password" id="pass-daftar" placeholder="Minimal 6 karakter">
            
            <button onclick="aksiDaftar()" class="btn-daftar">Daftar Akun</button>
            
            <p class="text-center text-sm text-slate-400 mt-4">
                Sudah punya akun? <span onclick="tampilLogin()" class="text-blue-400">Masuk</span>
            </p>
        </div>
    </div>

    <!-- HALAMAN DASHBOARD -->
    <div id="halaman-dashboard" class="dashboard-container hidden">
        <div class="nav">
            <h2>CS Logistics</h2>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="nama-user">User</span>
                <span id="badge-admin" class="badge-admin hidden">ADMIN</span>
                <button onclick="aksiLogout()" class="btn-logout">Logout</button>
            </div>
        </div>

        <div style="background: #1e293b; padding: 40px; border-radius: 12px; text-align: center;">
            <h2>Selamat Datang! 👋</h2>
            <p class="text-slate-400 mb-4">Anda berhasil login ke Logistics Tracker</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <p class="text-slate-400">Total Tender</p>
                </div>
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <p class="text-slate-400">Dalam Proses</p>
                </div>
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <p class="text-slate-400">Selesai</p>
                </div>
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <p class="text-slate-400">Lunas</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI SUPABASE - GANTI INI!
        // ==========================================
        const SUPABASE_URL = 'https://ixgwxbehsmgmczzfvjse.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Z3d4YmVoc21nbWN6emZ2anNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3OTksImV4cCI6MjA5MjU0NTc5OX0.rnZYdHiqLzRz5xAb9DR3YmeWY91LsfJJYYoeWa7s7WA'; 

        // Inisialisasi Supabase
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fungsi Tampilkan Pesan
        function tampilkanPesan(msg, tipe) {
            const el = document.getElementById('pesan-error');
            el.textContent = msg;
            el.className = `alert alert-${tipe}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        // Fungsi Ganti Tampilan Login/Daftar
        function tampilDaftar() {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-daftar').classList.remove('hidden');
            document.getElementById('pesan-error').style.display = 'none';
        }
        function tampilLogin() {
            document.getElementById('form-daftar').classList.add('hidden');
            document.getElementById('form-login').classList.remove('hidden');
            document.getElementById('pesan-error').style.display = 'none';
        }

        // --- FUNGSI LOGIN ---
        async function aksiLogin() {
            const email = document.getElementById('email-login').value.trim();
            const pass = document.getElementById('pass-login').value;

            if (!email || !pass) return tampilkanPesan('Isi email dan password!', 'error');

            // Login ke Supabase
            const { data, error } = await client.auth.signInWithPassword({
                email: email,
                password: pass
            });

            if (error) return tampilkanPesan(error.message, 'error');

            // Jika berhasil, masuk ke Dashboard
            masukDashboard(data.session);
        }

        // --- FUNGSI REGISTER ---
        async function aksiDaftar() {
            const name = document.getElementById('nama-daftar').value.trim();
            const email = document.getElementById('email-daftar').value.trim();
            const pass = document.getElementById('pass-daftar').value;

            if (!name || !email || !pass) return tampilkanPesan('Lengkapi semua data!', 'error');
            if (pass.length < 6) return tampilkanPesan('Password minimal 6 karakter!', 'error');

            // Daftar ke Supabase
            const { data, error } = await client.auth.signUp({
                email: email,
                password: pass,
                options: {
                    data: { name: name }
                }
            });

            if (error) return tampilkanPesan(error.message, 'error');
            
            // Simpan data profil ke tabel 'profiles'
            if (data.user) {
                await client.from('profiles').insert([
                    { id: data.user.id, name: name, email: email, role: 'pengguna' }
                ]);
            }

            tampilkanPesan('Registrasi berhasil! Silakan login.', 'success');
            setTimeout(tampilLogin, 1500);
        }

        // --- FUNGSI MASUK DASHBOARD ---
        async function masukDashboard(session) {
            document.getElementById('halaman-login').classList.add('hidden');
            document.getElementById('halaman-dashboard').classList.remove('hidden');
            
            // Tampilkan Nama User
            document.getElementById('nama-user').textContent = session.user.email;

            // CEK APAKAH ADMIN
            // Cek sesi sekali lagi untuk memastikan
            const { data: { session: currentSession } } = await client.auth.getSession();
            
            // Ambil data role dari database
            const { data: profile, error } = await client
                .from('profiles')
                .select('role, name')
                .eq('id', session.user.id)
                .single();

            if (profile) {
                if(profile.name) document.getElementById('nama-user').textContent = profile.name;
                
                // Jika role admin, tampilkan badge
                if (profile.role === 'admin') {
                    document.getElementById('badge-admin').classList.remove('hidden');
                }
            }
        }

        // --- FUNGSI LOGOUT ---
        async function aksiLogout() {
            await client.auth.signOut();
            location.reload();
        }

        // CEK SESI SAAT HALAMAN DIBUKA
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                masukDashboard(session);
            }
        });
    </script>
</body>
</html>
