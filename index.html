<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .hidden { display: none; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #3b82f6; color: white; border: none; }
        .btn-primary:hover { background: #2563eb; }
        .btn-logout { background: #ef4444; color: white; border: none; width: auto; padding: 5px 15px; }
        .alert { padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 14px; }
        .alert-error { background: #7f1d1d; color: #fca5a5; }
        .alert-success { background: #14532d; color: #86efac; }
    </style>
</head>
<body>
    <div id="auth-page">
        <div class="card">
            <h1 class="text-2xl font-bold">Logistics Tracker</h1>
            <p class="text-slate-400 text-sm">PT. Cahaya Sejati Teknologi</p>
            <div class="alert hidden" id="alert-box"></div>

            <!-- Login Form -->
            <label class="text-sm text-slate-300">Email</label>
            <input type="email" id="login-email" placeholder="Email">
            <label class="text-sm text-slate-300">Password</label>
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn-primary" onclick="doLogin()">Masuk</button>
            <a class="text-blue-400 underline" href="#" onclick="showRegister()">Daftar</a>
        </div>
    </div>

    <div id="register-page" class="hidden">
        <div class="card">
            <h1 class="text-2xl font-bold">Daftar Akun</h1>
            <label class="text-sm text-slate-300">Nama Lengkap</label>
            <input type="text" id="register-name" placeholder="Nama Lengkap">
            <label class="text-sm text-slate-300">Email</label>
            <input type="email" id="register-email" placeholder="Email">
            <label class="text-sm text-slate-300">Password</label>
            <input type="password" id="register-password" placeholder="Password">
            <button class="btn-primary bg-green-600 hover:bg-green-700" onclick="doRegister()">Daftar Akun</button>
        </div>
    </div>

    <div id="dashboard-page" class="hidden">
        <h1>Dashboard</h1>
        <p>Selamat datang, <span id="user-display-name"></span></p>
        <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>

    <script>
        const client = supabase.createClient('https://ixgwxbehsmgmczzfvjse.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Z3d4YmVoc21nbWN6emZ2anNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3OTksImV4cCI6MjA5MjU0NTc5OX0.rnZYdHiqLzRz5xAb9DR3YmeWY91LsfJJYYoeWa7s7WA');

        async function doLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { user, error } = await client.auth.signInWithPassword({ email, password });

            if (error) {
                showAlert(error.message, 'error');
            } else {
                enterDashboard(user);
            }
        }

        async function doRegister() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            const { user, error } = await client.auth.signUp({ email, password });

            if (error) {
                showAlert(error.message, 'error');
            } else {
                await client.from('profiles').insert([{ id: user.id, name, email, role: 'pengguna' }]);
                showAlert('Registrasi berhasil! Silakan login.', 'success');
                setTimeout(showLogin, 1500);
            }
        }

        async function enterDashboard(user) {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            document.getElementById('user-display-name').textContent = user.email;
        }

        async function doLogout() {
            await client.auth.signOut();
            location.reload();
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alert-box');
            alertBox.classList.remove('hidden');
            alertBox.classList.add(`alert-${type}`);
            alertBox.textContent = message;
        }

        function showLogin() {
            document.getElementById('register-page').classList.add('hidden');
            document.getElementById('auth-page').classList.remove('hidden');
        }

        function showRegister() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('register-page').classList.remove('hidden');
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                enterDashboard(session.user);
            }
        });
    </script>
</body>
</html>
