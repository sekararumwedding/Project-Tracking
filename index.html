<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; }
        .logo { width: 64px; height: 64px; background: linear-gradient(135deg, #3b82f6, #2563eb); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; margin: 0 auto 20px; }
        h1 { text-align: center; color: white; margin-bottom: 8px; font-size: 26px; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #cbd5e1; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        input { width: 100%; padding: 14px 16px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 12px; color: white; font-size: 14px; transition: all 0.3s; }
        input:focus { outline: none; border-color: #3b82f6; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .toggle { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 14px; }
        .toggle span { color: #60a5fa; cursor: pointer; text-decoration: underline; }
        .alert { padding: 12px; border-radius: 10px; margin-bottom: 20px; display: none; text-align: center; }
        .alert-error { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.15); color: #86efac; }
        .hidden { display: none !important; }
        #dashboard { position: fixed; inset: 0; background: #0f172a; padding: 40px; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">CS</div>
    <h1>Logistics Tracker</h1>
    <p class="subtitle">PT. Cahaya Sejati Teknologi</p>
    <div id="alertBox" class="alert"></div>
    
    <div id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="emailLogin" placeholder="nama@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="passLogin" placeholder="••••••••">
        </div>
        <button id="btnMasuk" onclick="handleLogin()">Masuk</button>
        <div class="toggle">Belum punya akun? <span onclick="showRegister()">Daftar</span></div>
    </div>
    
    <div id="registerForm" class="hidden">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="namaRegis" placeholder="Nama Lengkap">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="emailRegis" placeholder="nama@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="passRegis" placeholder="Minimal 6 karakter">
        </div>
        <button id="btnDaftar" onclick="handleRegister()">Daftar Akun</button>
        <div class="toggle">Sudah punya akun? <span onclick="showLogin()">Masuk</span></div>
    </div>
</div>

<div id="dashboard" class="hidden">
    <div style="max-width: 800px; margin: 0 auto; text-align: center;">
        <h1 style="margin-bottom: 20px;">Selamat Datang! 🎉</h1>
        <p id="userInfo" style="color: #94a3b8; margin-bottom: 30px; font-size: 18px;"></p>
        <button onclick="handleLogout()" style="max-width: 200px; background: #ef4444;">Logout</button>
    </div>
</div>

<script>
var SUPABASE_URL = 'https://ixgwxbehsmgmczzfvjse.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Z3d4YmVoc21nbWN6emZ2anNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3OTksImV4cCI6MjA5MjU0NTc5OX0.rnZYdHiqLzRz5xAb9DR3YmeWY91LsfJJYYoeWa7s7WA';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showAlert(msg, type) {
    var el = document.getElementById('alertBox');
    el.textContent = msg;
    el.className = 'alert alert-' + type;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 4000);
}

function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('alertBox').style.display = 'none';
}

function showLogin() {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('alertBox').style.display = 'none';
}

function handleLogin() {
    var email = document.getElementById('emailLogin').value.trim();
    var password = document.getElementById('passLogin').value;
    var btn = document.getElementById('btnMasuk');
    
    if (!email || !password) {
        showAlert('Email dan password wajib diisi', 'error');
        return;
    }
    
    btn.disabled = true;
    btn.textContent = 'Memproses...';
    
    supabase.auth.signInWithPassword({
        email: email,
        password: password
    }).then(function(result) {
        btn.disabled = false;
        btn.textContent = 'Masuk';
        
        if (result.error) {
            showAlert(result.error.message, 'error');
        } else {
            showAlert('Login berhasil!', 'success');
            setTimeout(function() {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('userInfo').textContent = 'Login sebagai: ' + result.data.user.email;
            }, 1000);
        }
    }).catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'Masuk';
        showAlert('Error: ' + err.message, 'error');
    });
}

function handleRegister() {
    var name = document.getElementById('namaRegis').value.trim();
    var email = document.getElementById('emailRegis').value.trim();
    var password = document.getElementById('passRegis').value;
    var btn = document.getElementById('btnDaftar');
    
    if (!name || !email || !password) {
        showAlert('Semua field wajib diisi', 'error');
        return;
    }
    
    if (password.length < 6) {
        showAlert('Password minimal 6 karakter', 'error');
        return;
    }
    
    btn.disabled = true;
    btn.textContent = 'Memproses...';
    
    supabase.auth.signUp({
        email: email,
        password: password,
        options: {
             {
                name: name
            }
        }
    }).then(function(result) {
        btn.disabled = false;
        btn.textContent = 'Daftar Akun';
        
        if (result.error) {
            showAlert(result.error.message, 'error');
        } else {
            if (result.data && result.data.user) {
                supabase.from('profiles').insert([{
                    id: result.data.user.id,
                    name: name,
                    email: email,
                    role: 'pengguna'
                }]).then(function() {
                    showAlert('Registrasi berhasil! Silakan login.', 'success');
                    setTimeout(function() {
                        showLogin();
                        document.getElementById('namaRegis').value = '';
                        document.getElementById('emailRegis').value = '';
                        document.getElementById('passRegis').value = '';
                    }, 1500);
                });
            }
        }
    }).catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'Daftar Akun';
        showAlert('Error: ' + err.message, 'error');
    });
}

function handleLogout() {
    supabase.auth.signOut().then(function() {
        location.reload();
    });
}

window.addEventListener('DOMContentLoaded', function() {
    supabase.auth.getSession().then(function(result) {
        if (result.data && result.data.session) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userInfo').textContent = 'Login sebagai: ' + result.data.session.user.email;
        }
    });
});
</script>

</body>
</html>
