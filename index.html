<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f1f3d 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            margin: 100px auto;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin: 0 auto 20px;
        }
        h1 { text-align: center; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #cbd5e1; margin-bottom: 8px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15,31,61,0.6);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .toggle {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 14px;
        }
        .toggle a { color: #60a5fa; cursor: pointer; text-decoration: underline; }
        .error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error.show { display: block; }
        .success { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #86efac; }
        .hidden { display: none !important; }
        
        /* Dashboard Styles */
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .navbar {
            background: rgba(15, 31, 61, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .logout-btn {
            background: rgba(239, 68, 68, 0.8);
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .welcome-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }
        .stat-number { font-size: 32px; font-weight: bold; color: #3b82f6; }
        .stat-label { color: #94a3b8; font-size: 14px; margin-top: 5px; }
        .admin-badge {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="loginView" class="container">
    <div class="logo">CS</div>
    <h1>Logistics Tracker</h1>
    <p class="subtitle">PT. Cahaya Sejati Teknologi</p>

    <div id="errorBox" class="error"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="nama@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button type="button" onclick="handleLogin()" id="loginBtn">Masuk</button>
        <div class="toggle">
            Belum punya akun? <a onclick="showRegister()">Daftar</a>
        </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="regName" placeholder="Nama Lengkap">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="nama@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Minimal 6 karakter">
        </div>
        <button type="button" onclick="handleRegister()" id="registerBtn">Daftar Akun</button>
        <div class="toggle">
            Sudah punya akun? <a onclick="showLogin()">Masuk</a>
        </div>
    </div>
</div>

<!-- DASHBOARD VIEW (Hidden by default) -->
<div id="dashboardView" class="dashboard hidden">
    <div class="navbar">
        <div style="font-size: 24px; font-weight: bold;">CS Logistics</div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span id="userName">Loading...</span>
            <span id="adminBadge" class="admin-badge" style="display: none;">ADMIN</span>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>
    
    <div class="welcome-card">
        <h1>Selamat Datang! 👋</h1>
        <p>Anda berhasil login ke Logistics Tracker</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Total Tender</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Dalam Proses</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Selesai</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Lunas</div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================
// ⚠️ GANTI DENGAN DATA SUPABASE ANDA ⚠️
// ============================================
var SUPABASE_URL = 'https://ixgwxbehsmgmazzfvjse.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Z3d4YmVoc21nbWN6emZ2anNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3OTksImV4cCI6MjA5MjU0NTc5OX0.rnZYdHiqLzRz5xAb9DR3YmeWY91LsfJJYYoeWa7s7WA';

// Initialize Supabase
var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Show message
function showMessage(message, type) {
    var errorBox = document.getElementById('errorBox');
    errorBox.textContent = message;
    errorBox.className = 'error show' + (type === 'success' ? ' success' : '');
    setTimeout(function() {
        errorBox.className = 'error';
    }, 5000);
}

// Toggle forms
function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('errorBox').className = 'error';
}

function showLogin() {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('errorBox').className = 'error';
}

// Show Dashboard
function showDashboard(userData) {
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('dashboardView').classList.remove('hidden');
    
    // Get user profile
    supabaseClient
        .from('profiles')
        .select('name, role')
        .eq('id', userData.user.id)
        .single()
        .then(function(profileData) {
            if (profileData.data) {
                document.getElementById('userName').textContent = profileData.data.name || userData.user.email;
                if (profileData.data.role === 'admin') {
                    document.getElementById('adminBadge').style.display = 'inline-block';
                }
            } else {
                document.getElementById('userName').textContent = userData.user.email;
            }
        });
}

// Handle Login
function handleLogin() {
    var email = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;
    var btn = document.getElementById('loginBtn');

    if (!email || !password) {
        showMessage('⚠️ Email dan password wajib diisi');
        return;
    }

    btn.textContent = 'Memproses...';
    btn.disabled = true;

    supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
    }).then(function(result) {
        if (result.error) {
            showMessage('❌ ' + result.error.message);
            btn.textContent = 'Masuk';
            btn.disabled = false;
        } else {
            showMessage('✅ Login berhasil!', 'success');
            setTimeout(function() {
                showDashboard(result.data);
            }, 500);
        }
    }).catch(function(err) {
        showMessage('❌ ' + err.message);
        btn.textContent = 'Masuk';
        btn.disabled = false;
    });
}

// Handle Register
function handleRegister() {
    var name = document.getElementById('regName').value.trim();
    var email = document.getElementById('regEmail').value.trim();
    var password = document.getElementById('regPassword').value;
    var btn = document.getElementById('registerBtn');

    if (!name || !email || !password) {
        showMessage('⚠️ Semua field wajib diisi');
        return;
    }

    if (password.length < 6) {
        showMessage('⚠️ Password minimal 6 karakter');
        return;
    }

    btn.textContent = 'Memproses...';
    btn.disabled = true;

    supabaseClient.auth.signUp({
        email: email,
        password: password,
        options: {
            data: {
                name: name
            }
        }
    }).then(function(result) {
        if (result.error) {
            showMessage('❌ ' + result.error.message);
            btn.textContent = 'Daftar Akun';
            btn.disabled = false;
        } else {
            if (result.data && result.data.user) {
                supabaseClient
                    .from('profiles')
                    .insert([{
                        id: result.data.user.id,
                        name: name,
                        email: email,
                        role: 'pengguna'
                    }])
                    .then(function() {
                        showMessage('✅ Registrasi berhasil! Silakan login.', 'success');
                        setTimeout(function() {
                            showLogin();
                            btn.textContent = 'Daftar Akun';
                            btn.disabled = false;
                        }, 1500);
                    });
            } else {
                showMessage('✅ Registrasi berhasil! Silakan login.', 'success');
                setTimeout(function() {
                    showLogin();
                    btn.textContent = 'Daftar Akun';
                    btn.disabled = false;
                }, 1500);
            }
        }
    }).catch(function(err) {
        showMessage('❌ ' + err.message);
        btn.textContent = 'Daftar Akun';
        btn.disabled = false;
    });
}

// Logout
function handleLogout() {
    if (confirm('Yakin ingin logout?')) {
        supabaseClient.auth.signOut().then(function() {
            location.reload();
        });
    }
}

// Check session on load
window.addEventListener('load', function() {
    supabaseClient.auth.getSession().then(function(sessionData) {
        if (sessionData.data && sessionData.data.session) {
            showDashboard(sessionData.data.session);
        }
    });
});

// Enter key support
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        var loginForm = document.getElementById('loginForm');
        if (!loginForm.classList.contains('hidden')) {
            handleLogin();
        } else {
            handleRegister();
        }
    }
});
</script>

</body>
</html>
