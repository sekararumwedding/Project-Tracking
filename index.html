<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Tracker - PT. Cahaya Sejati Teknologi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: #e2e8f0; }
        .container { max-width: 450px; margin: 80px auto; padding: 0 20px; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .logo { width: 64px; height: 64px; background: linear-gradient(135deg, #3b82f6, #2563eb); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: white; margin: 0 auto 20px; }
        h1 { text-align: center; font-size: 26px; margin-bottom: 6px; color: #fff; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #cbd5e1; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
        input { width: 100%; padding: 12px 14px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 10px; color: white; font-size: 14px; transition: 0.2s; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        button.primary { width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; border-radius: 10px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        button.primary:hover { opacity: 0.9; transform: translateY(-1px); }
        button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .toggle { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 13px; }
        .toggle a { color: #60a5fa; cursor: pointer; text-decoration: none; font-weight: 500; }
        .toggle a:hover { text-decoration: underline; }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; display: none; }
        .alert.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
        .hidden { display: none !important; }

        /* Dashboard Styles */
        .dashboard-wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); padding: 16px 24px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border: 1px solid rgba(148,163,184,0.1); }
        .nav-brand { font-size: 20px; font-weight: 700; color: #fff; }
        .nav-user { display: flex; align-items: center; gap: 12px; }
        .badge { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-logout { background: rgba(239,68,68,0.2); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-logout:hover { background: rgba(239,68,68,0.3); }
        .hero { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148,163,184,0.1); border-radius: 16px; padding: 40px 20px; text-align: center; }
        .hero h2 { font-size: 28px; margin-bottom: 8px; color: #fff; }
        .hero p { color: #94a3b8; margin-bottom: 32px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .stat-card { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(148,163,184,0.1); border-radius: 12px; padding: 24px; text-align: center; }
        .stat-val { font-size: 32px; font-weight: 800; color: #3b82f6; margin-bottom: 4px; }
        .stat-label { color: #94a3b8; font-size: 13px; }
    </style>
</head>
<body>

<!-- AUTH VIEW -->
<div id="authView" class="container">
    <div class="card">
        <div class="logo">CS</div>
        <h1>Logistics Tracker</h1>
        <p class="subtitle">PT. Cahaya Sejati Teknologi</p>
        <div id="authAlert" class="alert"></div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="nama@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="••••••••">
            </div>
            <button class="primary" onclick="doLogin()" id="btnLogin">Masuk</button>
            <div class="toggle">Belum punya akun? <a onclick="switchAuth('register')">Daftar</a></div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="regName" placeholder="Nama Lengkap">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="nama@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPass" placeholder="Minimal 6 karakter">
            </div>
            <button class="primary" onclick="doRegister()" id="btnReg">Daftar Akun</button>
            <div class="toggle">Sudah punya akun? <a onclick="switchAuth('login')">Masuk</a></div>
        </div>
    </div>
</div>

<!-- DASHBOARD VIEW -->
<div id="dashboardView" class="dashboard-wrap hidden">
    <div class="nav">
        <div class="nav-brand">CS Logistics</div>
        <div class="nav-user">
            <span id="userName">Loading...</span>
            <span id="adminBadge" class="badge hidden">ADMIN</span>
            <button class="btn-logout" onclick="doLogout()">Logout</button>
        </div>
    </div>
    <div class="hero">
        <h2>Selamat Datang! 👋</h2>
        <p>Anda berhasil login ke Logistics Tracker</p>
        <div class="stats">
            <div class="stat-card"><div class="stat-val">0</div><div class="stat-label">Total Tender</div></div>
            <div class="stat-card"><div class="stat-val">0</div><div class="stat-label">Dalam Proses</div></div>
            <div class="stat-card"><div class="stat-val">0</div><div class="stat-label">Selesai</div></div>
            <div class="stat-card"><div class="stat-val">0</div><div class="stat-label">Lunas</div></div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ KONFIGURASI SUPABASE (GANTI BAGIAN INI) ⚠️
    // ==========================================
    const SUPABASE_URL = 'https://ixgwxbehsmgmczzfvjse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Z3d4YmVoc21nbWN6emZ2anNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3OTksImV4cCI6MjA5MjU0NTc5OX0.rnZYdHiqLzRz5xAb9DR3YmeWY91LsfJJYYoeWa7s7WA';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // UI Helpers
    function showAlert(msg, type) {
        const el = document.getElementById('authAlert');
        el.textContent = msg;
        el.className = `alert ${type}`;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    function switchAuth(mode) {
        document.getElementById('loginForm').classList.toggle('hidden', mode !== 'login');
        document.getElementById('registerForm').classList.toggle('hidden', mode !== 'register');
        document.getElementById('authAlert').style.display = 'none';
    }

    function showDashboard(userData) {
        document.getElementById('authView').classList.add('hidden');
        document.getElementById('dashboardView').classList.remove('hidden');
        document.getElementById('userName').textContent = userData.user.email.split('@')[0];

        // Fetch Role from Profiles Table
        supabase
            .from('profiles')
            .select('role')
            .eq('id', userData.user.id)
            .single()
            .then(({ data, error }) => {
                if (error) {
                    console.warn('Gagal mengambil role:', error.message);
                    return;
                }
                console.log('User Role:', data?.role);
                if (data?.role === 'admin') {
                    document.getElementById('adminBadge').classList.remove('hidden');
                }
            })
            .catch(console.error);
    }

    // Auth Actions
    async function doLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPass').value;
        const btn = document.getElementById('btnLogin');

        if (!email || !pass) return showAlert('Email dan password wajib diisi', 'error');

        btn.disabled = true; btn.textContent = 'Memproses...';

        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
        btn.disabled = false; btn.textContent = 'Masuk';

        if (error) return showAlert(error.message, 'error');
        
        showAlert('Login berhasil!', 'success');
        setTimeout(() => showDashboard(data), 600);
    }

    async function doRegister() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPass').value;
        const btn = document.getElementById('btnReg');

        if (!name || !email || !pass) return showAlert('Semua field wajib diisi', 'error');
        if (pass.length < 6) return showAlert('Password minimal 6 karakter', 'error');

        btn.disabled = true; btn.textContent = 'Memproses...';

        const { data, error } = await supabase.auth.signUp({
            email,
            password: pass,
            options: { data: { name } }
        });
        btn.disabled = false; btn.textContent = 'Daftar Akun';

        if (error) return showAlert(error.message, 'error');

        // Simpan ke tabel profiles
        if (data.user) {
            await supabase.from('profiles').insert([{ id: data.user.id, name, email, role: 'pengguna' }]);
        }

        showAlert('Registrasi berhasil! Silakan login.', 'success');
        setTimeout(() => switchAuth('login'), 1500);
    }

    async function doLogout() {
        await supabase.auth.signOut();
        location.reload();
    }

    // Check Session on Load
    window.addEventListener('DOMContentLoaded', async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) showDashboard(session);
    });

    // Enter Key Support
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (!document.getElementById('loginForm').classList.contains('hidden')) doLogin();
            else doRegister();
        }
    });
</script>

</body>
</html>
