<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Tracker - PT. Cahaya Sejati Teknologi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        primary: { 
                            50:'#eff6ff', 100:'#dbeafe', 200:'#bfdbfe', 300:'#93c5fd',
                            400:'#60a5fa', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8',
                            800:'#1e3a5f', 900:'#0f1f3d' 
                        }, 
                        dark: { 700:'#1a2332', 800:'#111827', 900:'#0a0f1a' } 
                    } 
                } 
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0a0f1a 0%, #1a2332 100%);
            min-height: 100vh;
        }
        .glass { 
            background: rgba(30, 58, 95, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(59, 130, 246, 0.2); 
        }
        input { 
            background: rgba(15, 31, 61, 0.6) !important; 
            color: #e2e8f0 !important; 
            border: 1px solid rgba(59, 130, 246, 0.3) !important; 
        }
        input:focus { 
            border-color: #3b82f6 !important; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2) !important; 
            outline: none !important; 
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-200 flex items-center justify-center p-4">

    <!-- LOGIN VIEW -->
    <div id="login-view" class="w-full max-w-md fade-in">
        <div class="glass rounded-2xl p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4 shadow-lg">
                    CS
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">Logistics Tracker</h2>
                <p class="text-sm text-gray-400">PT. Cahaya Sejati Teknologi</p>
            </div>
            
            <!-- Login Form -->
            <div id="login-form">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <input type="email" id="login-email" placeholder="nama@email.com" 
                               class="w-full rounded-lg px-4 py-3 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" 
                               class="w-full rounded-lg px-4 py-3 text-sm">
                    </div>
                </div>
                
                <button type="button" onclick="handleLogin()" 
                        class="w-full mt-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 rounded-lg font-semibold text-white shadow-lg transition-all transform hover:scale-[1.02]">
                    Masuk
                </button>
                
                <p class="text-center text-sm text-gray-400 mt-6">
                    Belum punya akun? 
                    <button type="button" onclick="toggleAuthMode()" 
                            class="text-blue-400 hover:text-blue-300 font-medium underline underline-offset-2">
                        Daftar
                    </button>
                </p>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Nama Lengkap</label>
                        <input type="text" id="reg-name" placeholder="Nama Lengkap" 
                               class="w-full rounded-lg px-4 py-3 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <input type="email" id="reg-email" placeholder="nama@email.com" 
                               class="w-full rounded-lg px-4 py-3 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input type="password" id="reg-password" placeholder="Minimal 6 karakter" 
                               class="w-full rounded-lg px-4 py-3 text-sm">
                    </div>
                </div>
                
                <button type="button" onclick="handleRegister()" 
                        class="w-full mt-6 py-3 bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 rounded-lg font-semibold text-white shadow-lg transition-all transform hover:scale-[1.02]">
                    Daftar Akun
                </button>
                
                <p class="text-center text-sm text-gray-400 mt-6">
                    Sudah punya akun? 
                    <button type="button" onclick="toggleAuthMode()" 
                            class="text-blue-400 hover:text-blue-300 font-medium underline underline-offset-2">
                        Masuk
                    </button>
                </p>
            </div>
            
            <p id="auth-error" class="text-red-400 text-sm text-center mt-4 hidden bg-red-400/10 px-4 py-2 rounded-lg"></p>
        </div>
    </div>

    <script>
    // ==========================================
    // ⚠️ GANTI DENGAN DATA SUPABASE ANDA ⚠️
    // ==========================================
    const SUPABASE_URL = 'https://ixgwxbehsmgmczzfvjse.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_xIL19QNKrG2iBzQyiO6EYw_LV0sda5-';
    
    // Initialize Supabase - HANYA SEKALI (PENTING!)
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Toggle antara Login dan Register
    function toggleAuthMode() {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const errorEl = document.getElementById('auth-error');
        
        loginForm.classList.toggle('hidden');
        registerForm.classList.toggle('hidden');
        errorEl.classList.add('hidden');
        errorEl.textContent = '';
    }

    // Handle Login
    async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('auth-error');
        
        if (!email || !password) {
            errorEl.textContent = '⚠️ Email dan password wajib diisi';
            errorEl.classList.remove('hidden');
            return;
        }
        
        try {
            const { data, error } = await supabase.auth.signInWithPassword({ 
                email: email, 
                password: password 
            });
            
            if (error) throw error;
            
            alert('✅ Login berhasil!');
            location.reload();
            
        } catch (err) {
            errorEl.textContent = '❌ ' + err.message;
            errorEl.classList.remove('hidden');
            console.error('Login error:', err);
        }
    }

    // Handle Register
    async function handleRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const errorEl = document.getElementById('auth-error');
        
        if (!name || !email || !password) {
            errorEl.textContent = '⚠️ Semua field wajib diisi';
            errorEl.classList.remove('hidden');
            return;
        }
        
        if (password.length < 6) {
            errorEl.textContent = '⚠️ Password minimal 6 karakter';
            errorEl.classList.remove('hidden');
            return;
        }
        
        try {
            const { data, error } = await supabase.auth.signUp({ 
                email: email, 
                password: password,
                options: {
                    data: { 
                        name: name 
                    }
                }
            });
            
            if (error) throw error;
            
            // Simpan data profile ke database
            if (data.user) {
                await supabase.from('profiles').insert([
                    { 
                        id: data.user.id, 
                        name: name, 
                        role: 'pengguna',
                        created_at: new Date().toISOString()
                    }
                ]);
            }
            
            alert('✅ Registrasi berhasil! Silakan login.');
            toggleAuthMode();
            
        } catch (err) {
            errorEl.textContent = '❌ ' + err.message;
            errorEl.classList.remove('hidden');
            console.error('Register error:', err);
        }
    }

    // Enter key support
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            if (!document.getElementById('login-form').classList.contains('hidden')) {
                handleLogin();
            } else {
                handleRegister();
            }
        }
    });
    </script>
</body>
</html>
