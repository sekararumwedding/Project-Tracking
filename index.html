<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Logistics Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f1f3d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin: 0 auto 20px;
        }
        h1 { color: white; text-align: center; margin-bottom: 5px; font-size: 28px; }
        .subtitle { color: #94a3b8; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #cbd5e1; margin-bottom: 8px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15,31,61,0.6);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }
        .toggle {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 14px;
        }
        .toggle a {
            color: #60a5fa;
            cursor: pointer;
            text-decoration: underline;
        }
        .error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error.show { display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">CS</div>
    <h1>Logistics Tracker</h1>
    <p class="subtitle">PT. Cahaya Sejati Teknologi</p>

    <div id="errorBox" class="error"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="nama@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button type="button" onclick="handleLogin()">Masuk</button>
        <div class="toggle">
            Belum punya akun? <a onclick="showRegister()">Daftar</a>
        </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="regName" placeholder="Nama Lengkap">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="nama@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Minimal 6 karakter">
        </div>
        <button type="button" onclick="handleRegister()">Daftar Akun</button>
        <div class="toggle">
            Sudah punya akun? <a onclick="showLogin()">Masuk</a>
        </div>
    </div>
</div>

<script>
// ============================================
// ⚠️ GANTI DENGAN DATA SUPABASE ANDA ⚠️
// ============================================
var SUPABASE_URL = 'https://ixgwxbehsmgmczzfvjse.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Z3d4YmVoc21nbWN6emZ2anNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3OTksImV4cCI6MjA5MjU0NTc5OX0.rnZYdHiqLzRz5xAb9DR3YmeWY91LsfJJYYoeWa7s7WA';

// Initialize Supabase
var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Show error message
function showMessage(message) {
    var errorBox = document.getElementById('errorBox');
    errorBox.textContent = message;
    errorBox.classList.add('show');
    setTimeout(function() {
        errorBox.classList.remove('show');
    }, 5000);
}

// Toggle forms
function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('errorBox').classList.remove('show');
}

function showLogin() {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('errorBox').classList.remove('show');
}

// Handle Login
function handleLogin() {
    var email = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;

    if (!email || !password) {
        showMessage('⚠️ Email dan password wajib diisi');
        return;
    }

    supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
    }).then(function(result) {
        if (result.error) {
            showMessage('❌ ' + result.error.message);
        } else {
            showMessage('✅ Login berhasil!');
            setTimeout(function() {
                alert('Login berhasil!');
            }, 500);
        }
    }).catch(function(err) {
        showMessage('❌ ' + err.message);
    });
}

// Handle Register
function handleRegister() {
    var name = document.getElementById('regName').value.trim();
    var email = document.getElementById('regEmail').value.trim();
    var password = document.getElementById('regPassword').value;

    if (!name || !email || !password) {
        showMessage('⚠️ Semua field wajib diisi');
        return;
    }

    if (password.length < 6) {
        showMessage('⚠️ Password minimal 6 karakter');
        return;
    }

    // Sign up dengan Supabase Auth
    supabaseClient.auth.signUp({
        email: email,
        password: password,
        options: {
            data: {
                name: name
            }
        }
    }).then(function(result) {
        if (result.error) {
            showMessage('❌ ' + result.error.message);
        } else {
            // Simpan ke tabel profiles
            if (result.data && result.data.user) {
                supabaseClient
                    .from('profiles')
                    .insert([{
                        id: result.data.user.id,
                        name: name,
                        email: email,
                        role: 'pengguna'
                    }])
                    .then(function(insertResult) {
                        if (insertResult.error) {
                            console.error('Error save profile:', insertResult.error);
                        }
                        showMessage('✅ Registrasi berhasil! Silakan login.');
                        setTimeout(function() {
                            showLogin();
                        }, 1500);
                    });
            } else {
                showMessage('✅ Registrasi berhasil! Silakan login.');
                setTimeout(function() {
                    showLogin();
                }, 1500);
            }
        }
    }).catch(function(err) {
        showMessage('❌ ' + err.message);
    });
}

// Enter key support
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        var loginForm = document.getElementById('loginForm');
        if (!loginForm.classList.contains('hidden')) {
            handleLogin();
        } else {
            handleRegister();
        }
    }
});
</script>

</body>
</html>
